<!DOCTYPE html>
<html>
<head>
  <title>Scene 02 - 3D Model Loading</title>
  <style>
    body { margin: 0; background: #050D1A; }
    #info {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #4FC3F7;
      font-family: Arial, sans-serif;
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 8px 16px;
      border-radius: 20px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">Loading 3D model...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    // SCENE
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050D1A);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    // CONTROLS
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 1;
    controls.maxDistance = 10;

    // LIGHTS
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    // accent light — gives the model a cool colour rim
    const blueLight = new THREE.PointLight(0x4FC3F7, 1, 10);
    blueLight.position.set(-3, 2, -2);
    scene.add(blueLight);

    // FLOOR
    const floorGeo = new THREE.PlaneGeometry(20, 20);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x111122 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1;
    floor.receiveShadow = true;
    scene.add(floor);

    // LOAD GLTF MODEL
    const loader = new THREE.GLTFLoader();

    loader.load(
      // This is a free hosted duck model — the classic Three.js test model
      'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF/Duck.gltf',

      // SUCCESS — runs when model loads
      function(gltf) {
        const model = gltf.scene;
        model.scale.set(0.01, 0.01, 0.01);
        model.position.set(0, -1, 0);
        model.castShadow = true;
        scene.add(model);

        // Update the info text
        document.getElementById('info').textContent = 
          'Duck loaded ✓  —  drag to orbit · scroll to zoom';

        console.log('Model loaded successfully:', model);
      },

      // PROGRESS — runs while loading
      function(progress) {
        const percent = Math.round((progress.loaded / progress.total) * 100);
        document.getElementById('info').textContent = 
          `Loading model... ${percent}%`;
      },

      // ERROR — runs if something goes wrong
      function(error) {
        document.getElementById('info').textContent = 
          'Error loading model — check console';
        console.error('GLTF load error:', error);
      }
    );

    // ANIMATE
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // RESPONSIVE
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
